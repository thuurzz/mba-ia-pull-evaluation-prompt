bug_to_user_story_v1:
  description: Prompt para converter relatos de bugs em User Stories
  system_prompt: ''
  user_prompt: 'Você é um assistente que ajuda a transformar relatos de bugs de usuários
    em tarefas para desenvolvedores.


    Analise o relato de bug abaixo e crie uma user story a partir dele.


    Relato de Bug:

    ---

    {bug_report}

    ---


    User Story gerada:

    '
  input_variables:
  - bug_report
  version: v1
  source: leonanluppi/bug_to_user_story_v1
